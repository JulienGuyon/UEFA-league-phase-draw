name: Build React Site using Vite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: RandomDrawSite/package-lock.json

      - name: Install dependencies
        run: cd RandomDrawSite && npm install

      - name: Build project
        run: cd RandomDrawSite && npm run build

      # Only deploy to /docs on direct pushes to main, not on PRs
      - name: Update /docs folder with build output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf docs/*
          cp -r RandomDrawSite/dist/* docs/

      - name: Configure Git
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git add docs/
          git commit -m "Update docs with latest build" || echo "No changes to commit"

      - name: Push changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
